<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Progress</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* --- Top bar: header + progress + controls --- */
  .top-bar {
    flex-shrink: 0;
    padding: 1.25rem 1.5rem 0 1.5rem;
  }
  header {
    margin-bottom: 0.75rem;
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  h1 { font-size: 1.5rem; font-weight: 600; }
  .env-info {
    display: flex;
    gap: 1rem;
    margin-top: 0.3rem;
    font-size: 0.7rem;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .env-info a { color: var(--accent); text-decoration: none; }
  .env-info a:hover { text-decoration: underline; }
  .env-label {
    color: var(--text-muted);
    opacity: 0.6;
    margin-right: 0.2rem;
  }
  .badge {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 1rem;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge-running { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-complete { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-error { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-waiting { background: rgba(139,148,158,0.15); color: var(--text-muted); }

  .progress-bar-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.65rem 1rem;
    margin-bottom: 0.75rem;
  }
  .progress-bar-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.35rem;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .progress-eta {
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .progress-eta .eta-value {
    color: var(--text);
    font-weight: 500;
  }
  .progress-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .progress-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.35rem;
  }
  .controls {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .controls button {
    padding: 0.3rem 0.75rem;
    border-radius: 0.375rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .controls button:hover { border-color: var(--text-muted); }
  .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  .controls button.btn-pause { border-color: var(--yellow); color: var(--yellow); }
  .controls button.btn-pause:hover { background: rgba(210,153,34,0.1); }
  .controls button.btn-resume { border-color: var(--green); color: var(--green); }
  .controls button.btn-resume:hover { background: rgba(63,185,80,0.1); }
  .controls button.btn-stop { border-color: var(--red); color: var(--red); }
  .controls button.btn-stop:hover { background: rgba(248,81,73,0.1); }
  .control-status {
    font-size: 0.7rem;
    color: var(--yellow);
    align-self: center;
    margin-left: 0.5rem;
  }

  /* --- Two-pane layout --- */
  .panes {
    flex: 1;
    display: flex;
    min-height: 0;
    padding: 0 1.5rem;
    gap: 1px;
  }

  .pane {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .pane-steps {
    flex-shrink: 0;
    /* width set dynamically by JS based on longest step name */
  }
  .pane-right {
    flex: 1;
    min-width: 0;
    border-left: 1px solid var(--border);
    padding-left: 1.25rem;
    margin-left: 1.25rem;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .pane-header {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
    flex-shrink: 0;
  }

  .pane-scroll {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .pane-scroll::-webkit-scrollbar { width: 6px; }
  .pane-scroll::-webkit-scrollbar-track { background: transparent; }
  .pane-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* --- Steps --- */
  .steps { list-style: none; }
  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    transition: border-color 0.2s;
  }
  .step.step-active {
    border-color: var(--yellow);
  }
  .step-icon {
    flex-shrink: 0;
    width: 1.25rem;
    height: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    margin-top: 0.1rem;
  }
  .step-body { flex: 1; min-width: 0; }
  .step-title {
    font-weight: 600;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .step-detail {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }
  .step-detail a { color: var(--accent); text-decoration: none; }
  .step-detail a:hover { text-decoration: underline; }
  .step-time {
    flex-shrink: 0;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 0.15rem;
  }

  /* --- Issues & PRs panels --- */
  .right-panels {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }
  .right-panel {
  }
  .right-panel-header {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.35rem;
  }
  .right-panel-empty {
    font-size: 0.7rem;
    color: var(--text-muted);
    opacity: 0.5;
    font-style: italic;
    padding: 0.2rem 0;
  }
  .ticket {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.2rem 0;
    font-size: 0.75rem;
  }
  .ticket-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ticket-dot-open { background: var(--green); }
  .ticket-dot-in_progress { background: var(--yellow); }
  .ticket-dot-closed { background: var(--text-muted); }
  .ticket-dot-merged { background: var(--accent); }
  .ticket a { color: var(--text); text-decoration: none; }
  .ticket a:hover { color: var(--accent); text-decoration: underline; }
  .ticket-status {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-left: auto;
    flex-shrink: 0;
  }

  /* --- Events section (fills remaining space) --- */
  .events-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* --- Events --- */
  .event {
    font-size: 0.75rem;
    color: var(--text-muted);
    padding: 0.2rem 0;
    display: flex;
    gap: 0.6rem;
  }
  .event-time { flex-shrink: 0; font-family: monospace; font-size: 0.7rem; }
  .event-msg { color: var(--text); }
  .event-msg-warn { color: var(--yellow); }
  .event-msg-error { color: var(--red); }
  .event-msg-success { color: var(--green); }

  /* --- Footer --- */
  .footer {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 1.5rem;
    font-size: 0.7rem;
    color: var(--text-muted);
  }
  .footer.error .footer-status { color: var(--red); }
  .footer-status { flex: 1; text-align: center; }
  .footer-version { flex-shrink: 0; opacity: 0.5; }

  /* --- Completion overlay --- */
  .completion-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13, 17, 23, 0.45);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  .completion-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .completion-check {
    font-size: 8rem;
    color: var(--green);
    line-height: 1;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 40px rgba(63, 185, 80, 0.4));
  }
  .completion-text {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .completion-subtext {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  /* --- Stop overlay --- */
  .stop-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13, 17, 23, 0.45);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.6s ease;
    pointer-events: none;
  }
  .stop-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .stop-icon {
    font-size: 8rem;
    line-height: 1;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 40px rgba(248, 81, 73, 0.4));
  }
  .stop-text {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--red);
    margin-bottom: 0.5rem;
  }
  .stop-subtext {
    font-size: 0.85rem;
    color: var(--text-muted);
  }

  /* --- Pause overlay --- */
  .pause-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13, 17, 23, 0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .pause-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .pause-icon {
    font-size: 8rem;
    color: var(--yellow);
    line-height: 1;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 40px rgba(210, 153, 34, 0.4));
  }
  .pause-text {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--yellow);
    margin-bottom: 1.5rem;
  }
  .pause-resume-btn {
    padding: 0.75rem 2.5rem;
    border-radius: 0.5rem;
    border: 2px solid var(--green);
    background: rgba(63, 185, 80, 0.1);
    color: var(--green);
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .pause-resume-btn:hover {
    background: rgba(63, 185, 80, 0.25);
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 0.9rem;
    height: 0.9rem;
    border: 2px solid var(--border);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* --- Measuring element (hidden) --- */
  .measure {
    position: absolute;
    visibility: hidden;
    white-space: nowrap;
    font-weight: 600;
    font-size: 0.85rem;
    font-family: inherit;
  }
</style>
</head>
<body>
  <div class="top-bar">
    <header>
      <div class="header-row">
        <h1 id="title">Loading...</h1>
        <span id="status-badge" class="badge badge-waiting">waiting</span>
      </div>
      <div id="env-info" class="env-info"></div>
    </header>

    <div class="progress-bar-container">
      <div class="progress-bar-label">
        <span id="progress-label">0 / 0 steps</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-track">
        <div id="progress-fill" class="progress-bar-fill" style="width: 0%"></div>
      </div>
      <div class="progress-bottom">
        <div id="progress-eta" class="progress-eta"></div>
        <div id="controls" class="controls">
          <span id="control-status" class="control-status"></span>
          <button id="btn-pause" class="btn-pause" onclick="sendControl('pause')">Pause</button>
          <button id="btn-resume" class="btn-resume" onclick="sendControl('resume')" style="display:none">Resume</button>
          <button id="btn-stop" class="btn-stop" onclick="sendControl('stop')">Stop</button>
        </div>
      </div>
    </div>
  </div>

  <div class="panes">
    <div class="pane pane-steps" id="pane-steps">
      <div class="pane-header">Steps</div>
      <div class="pane-scroll" id="steps-scroll">
        <ul id="steps" class="steps"></ul>
      </div>
    </div>
    <div class="pane pane-right">
      <div id="right-panels" class="right-panels" style="display:none">
        <div class="right-panel">
          <div class="right-panel-header">Issues</div>
          <div id="issues"></div>
        </div>
        <div class="right-panel">
          <div class="right-panel-header">Pull Requests</div>
          <div id="prs"></div>
        </div>
      </div>
      <div class="events-section">
        <div class="pane-header">Event Log</div>
        <div class="pane-scroll" id="events-scroll">
          <div id="events"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="poll-status" class="footer">
    <span class="footer-status" id="footer-status">Connecting...</span>
    <span class="footer-version">v9</span>
  </div>

  <div id="completion-overlay" class="completion-overlay">
    <div class="completion-check">&check;</div>
    <div class="completion-text" id="completion-text">Complete</div>
    <div class="completion-subtext" id="completion-subtext"></div>
  </div>

  <div id="stop-overlay" class="stop-overlay">
    <div class="stop-icon">&#x1F6D1;</div>
    <div class="stop-text">Stopped</div>
    <div class="stop-subtext" id="stop-subtext">Agent has been stopped</div>
  </div>

  <div id="pause-overlay" class="pause-overlay">
    <div class="pause-icon">&#x23F8;</div>
    <div class="pause-text">Paused</div>
    <button class="pause-resume-btn" onclick="sendControl('resume')">Resume</button>
  </div>

  <span id="measure" class="measure"></span>

<script>
var POLL_INTERVAL = 1500;
var STATUS_ICONS = {
  not_started: '\u25CB',
  in_progress: null,
  complete: '\u2713',
  error: '\u2717',
  skipped: '\u2014'
};
var STATUS_COLORS = {
  not_started: 'var(--text-muted)',
  in_progress: 'var(--yellow)',
  complete: 'var(--green)',
  error: 'var(--red)',
  skipped: 'var(--text-muted)'
};

var lastJson = '';
var currentControl = null;
var localEvents = [];

function formatTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    for (var k of Object.keys(attrs)) {
      var v = attrs[k];
      if (k === 'style' && typeof v === 'object') {
        Object.assign(e.style, v);
      } else if (k === 'className') {
        e.className = v;
      } else if (k === 'textContent') {
        e.textContent = v;
      } else {
        e.setAttribute(k, v);
      }
    }
  }
  if (children) {
    for (var c of children) {
      if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
  }
  return e;
}

function measureStepWidth(steps) {
  var ruler = document.getElementById('measure');
  var maxW = 200;
  steps.forEach(function(step, i) {
    ruler.textContent = 'Step ' + (i + 1) + ': ' + (step.name || '');
    var w = ruler.offsetWidth;
    if (w > maxW) maxW = w;
  });
  // Add padding for icon (1.25rem + 0.6rem gap) + time (~5ch) + card padding + scroll margin
  // icon area ~30px, time ~65px, padding ~50px, breathing room ~30px
  return maxW + 175;
}

function buildStepEl(step, index, isPaused) {
  var isActive = step.status === 'in_progress';
  var iconEl = el('span', { className: 'step-icon', style: { color: STATUS_COLORS[step.status] || 'var(--text-muted)' } });
  if (isActive && isPaused) {
    iconEl.textContent = '\u23F8';
    iconEl.style.color = 'var(--yellow)';
  } else if (isActive) {
    iconEl.appendChild(el('span', { className: 'spinner' }));
  } else {
    iconEl.textContent = STATUS_ICONS[step.status] || '\u25CB';
  }

  var bodyChildren = [
    el('div', { className: 'step-title', textContent: 'Step ' + (index + 1) + ': ' + (step.name || '') })
  ];

  if (step.detail) {
    bodyChildren.push(el('div', { className: 'step-detail', textContent: step.detail }));
  }

  if (step.links && step.links.length > 0) {
    var linksDiv = el('div', { className: 'step-detail' });
    step.links.forEach(function(link, li) {
      if (li > 0) linksDiv.appendChild(document.createTextNode(' \u00B7 '));
      linksDiv.appendChild(el('a', { href: link.url, textContent: link.label }));
    });
    bodyChildren.push(linksDiv);
  }

  var stepChildren = [iconEl, el('div', { className: 'step-body' }, bodyChildren)];

  if (step.updated_at) {
    stepChildren.push(el('span', { className: 'step-time', textContent: formatTime(step.updated_at) }));
  }

  var className = 'step' + (isActive ? ' step-active' : '');
  var li = el('li', { className: className, id: 'step-' + index }, stepChildren);
  return li;
}

function buildEventEl(evt) {
  return el('div', { className: 'event' }, [
    el('span', { className: 'event-time', textContent: formatTime(evt.time) }),
    el('span', { className: 'event-msg', textContent: evt.message })
  ]);
}

function formatDuration(ms) {
  var totalSec = Math.round(ms / 1000);
  if (totalSec < 60) return totalSec + 's';
  var min = Math.floor(totalSec / 60);
  var sec = totalSec % 60;
  if (min < 60) return min + 'm ' + sec + 's';
  var hr = Math.floor(min / 60);
  min = min % 60;
  return hr + 'h ' + min + 'm';
}

function calcEta(steps) {
  var completed = [];
  var remaining = 0;
  var inProgressStart = null;

  steps.forEach(function(step) {
    if (step.status === 'complete' && step.started_at && step.completed_at) {
      var start = new Date(step.started_at).getTime();
      var end = new Date(step.completed_at).getTime();
      if (end > start) completed.push(end - start);
    } else if (step.status === 'in_progress') {
      if (step.started_at) inProgressStart = new Date(step.started_at).getTime();
      remaining++;
    } else if (step.status === 'not_started') {
      remaining++;
    }
  });

  if (completed.length === 0) {
    if (inProgressStart) return { text: 'Estimating time remaining\u2026 completing first step', state: 'calculating' };
    return { text: '', state: 'none' };
  }

  var avgMs = completed.reduce(function(a, b) { return a + b; }, 0) / completed.length;

  // For the in-progress step, estimate remaining time as max(0, avg - elapsed)
  var inProgressRemaining = 0;
  if (inProgressStart) {
    var elapsed = Date.now() - inProgressStart;
    inProgressRemaining = Math.max(0, avgMs - elapsed);
  }

  var totalRemaining = inProgressRemaining + (remaining > 0 ? (remaining - (inProgressStart ? 1 : 0)) * avgMs : 0);

  if (totalRemaining <= 0 && remaining === 0) return { text: '', state: 'none' };

  return {
    text: '~' + formatDuration(totalRemaining) + ' remaining',
    avgText: formatDuration(avgMs) + '/step avg',
    state: 'estimating'
  };
}

var envRendered = false;

function renderEnv(env) {
  if (!env || envRendered) return;
  envRendered = true;

  var container = document.getElementById('env-info');
  while (container.firstChild) container.removeChild(container.firstChild);

  function addItem(label, text, url) {
    if (!text) return;
    var span = document.createElement('span');
    var labelEl = document.createElement('span');
    labelEl.className = 'env-label';
    labelEl.textContent = label;
    span.appendChild(labelEl);
    if (url) {
      var a = document.createElement('a');
      a.href = url;
      a.textContent = text;
      a.target = '_blank';
      span.appendChild(a);
    } else {
      span.appendChild(document.createTextNode(text));
    }
    container.appendChild(span);
  }

  addItem('machine ', env.machine);
  addItem('repo ', env.repo, env.repo_url);
  if (env.worktree) {
    addItem('worktree ', env.worktree);
  }
  if (env.branch) {
    var branchUrl = env.repo_url ? env.repo_url + '/tree/' + env.branch : null;
    addItem('branch ', env.branch, branchUrl);
  }
}

function renderTickets(container, items, type) {
  while (container.firstChild) container.removeChild(container.firstChild);
  if (items.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'right-panel-empty';
    empty.textContent = 'Nothing yet, stay tuned...';
    container.appendChild(empty);
    return;
  }
  items.forEach(function(item) {
    var row = document.createElement('div');
    row.className = 'ticket';

    var dot = document.createElement('span');
    dot.className = 'ticket-dot ticket-dot-' + (item.status || 'open');
    row.appendChild(dot);

    var prefix = type === 'pr' ? 'PR' : '';
    var link = document.createElement('a');
    link.href = item.url || '#';
    link.target = '_blank';
    link.textContent = (prefix ? prefix + ' ' : '') + '#' + item.number + ' ' + (item.title || '');
    row.appendChild(link);

    var status = document.createElement('span');
    status.className = 'ticket-status';
    status.textContent = item.status || 'open';
    row.appendChild(status);

    container.appendChild(row);
  });
}

function render(data) {
  var displayTitle = (data.title || data.feature || 'Progress') + ' Roadmap';
  document.getElementById('title').textContent = displayTitle;
  document.title = displayTitle;

  // Render environment info (once)
  if (data.environment) renderEnv(data.environment);

  var badge = document.getElementById('status-badge');
  badge.textContent = data.status || 'running';
  badge.className = 'badge badge-' + (data.status === 'complete' ? 'complete' : data.status === 'error' ? 'error' : 'running');

  var steps = data.steps || [];
  var done = steps.filter(function(s) { return s.status === 'complete'; }).length;
  var total = steps.length;
  var pct = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('progress-label').textContent = done + ' / ' + total + ' steps';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  // ETA
  var etaEl = document.getElementById('progress-eta');
  while (etaEl.firstChild) etaEl.removeChild(etaEl.firstChild);
  if (data.status === 'running') {
    var eta = calcEta(steps);
    if (eta.state === 'calculating') {
      etaEl.appendChild(document.createTextNode(eta.text));
    } else if (eta.state === 'estimating') {
      var valSpan = document.createElement('span');
      valSpan.className = 'eta-value';
      valSpan.textContent = eta.text;
      etaEl.appendChild(valSpan);
      if (eta.avgText) {
        etaEl.appendChild(document.createTextNode('  \u00B7  ' + eta.avgText));
      }
    }
  } else if (data.status === 'complete') {
    // Show total elapsed time
    var firstStart = null;
    var lastEnd = null;
    steps.forEach(function(s) {
      if (s.started_at) {
        var t = new Date(s.started_at).getTime();
        if (!firstStart || t < firstStart) firstStart = t;
      }
      if (s.completed_at) {
        var t2 = new Date(s.completed_at).getTime();
        if (!lastEnd || t2 > lastEnd) lastEnd = t2;
      }
    });
    if (firstStart && lastEnd) {
      etaEl.appendChild(document.createTextNode('Completed in '));
      var valSpan2 = document.createElement('span');
      valSpan2.className = 'eta-value';
      valSpan2.textContent = formatDuration(lastEnd - firstStart);
      etaEl.appendChild(valSpan2);
    }
  }

  // Size steps pane based on longest step name
  var paneSteps = document.getElementById('pane-steps');
  var stepsWidth = measureStepWidth(steps);
  paneSteps.style.width = stepsWidth + 'px';

  // Render steps
  var stepsEl = document.getElementById('steps');
  while (stepsEl.firstChild) stepsEl.removeChild(stepsEl.firstChild);
  var activeIndex = -1;
  steps.forEach(function(step, i) {
    stepsEl.appendChild(buildStepEl(step, i, currentControl === 'pause'));
    if (step.status === 'in_progress') activeIndex = i;
  });

  // Scroll active step into view
  if (activeIndex >= 0) {
    var activeEl = document.getElementById('step-' + activeIndex);
    if (activeEl) {
      activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  // Render issues & PRs
  var issues = data.issues || [];
  var prs = data.prs || [];
  document.getElementById('right-panels').style.display = '';
  renderTickets(document.getElementById('issues'), issues, 'issue');
  renderTickets(document.getElementById('prs'), prs, 'pr');

  // Render events — merge server events with local events by timestamp
  var serverEvents = (data.events || []).map(function(e) {
    var cls = '';
    if (e.message && e.message.indexOf('Stop received') >= 0) cls = 'event-msg-error';
    else if (e.message && e.message.indexOf('Pause received') >= 0) cls = 'event-msg-warn';
    else if (e.message && e.message.indexOf('Resume received') >= 0) cls = 'event-msg-success';
    return { time: e.time, message: e.message, colorClass: cls };
  });
  var allEvents = serverEvents.concat(localEvents);
  allEvents.sort(function(a, b) { return a.time < b.time ? -1 : a.time > b.time ? 1 : 0; });

  var eventsEl = document.getElementById('events');
  while (eventsEl.firstChild) eventsEl.removeChild(eventsEl.firstChild);
  allEvents.forEach(function(evt) {
    var msgEl = el('span', { className: 'event-msg' + (evt.colorClass ? ' ' + evt.colorClass : ''), textContent: evt.message });
    var row = el('div', { className: 'event' }, [
      el('span', { className: 'event-time', textContent: formatTime(evt.time) }),
      msgEl
    ]);
    eventsEl.appendChild(row);
  });

  var eventsScroll = document.getElementById('events-scroll');
  eventsScroll.scrollTop = eventsScroll.scrollHeight;

  // Footer and overlays
  var footerEl = document.getElementById('poll-status');
  var statusEl = document.getElementById('footer-status');
  if (data.status === 'complete') {
    statusEl.textContent = 'Done. You can close this window.';
    footerEl.className = 'footer';
    hideControls();
    document.getElementById('pause-overlay').classList.remove('visible');
    showCompletionOverlay(steps);
  } else if (data.status === 'error') {
    hideControls();
    document.getElementById('pause-overlay').classList.remove('visible');
    var wasUserStop = false;
    (data.events || []).forEach(function(e) {
      if (e.message && e.message.indexOf('Stopped by user') >= 0) wasUserStop = true;
    });
    if (wasUserStop || currentControl === 'stop') {
      statusEl.textContent = 'Stopped. You can close this window.';
      footerEl.className = 'footer';
      showStopOverlay();
    } else {
      statusEl.textContent = 'Agent stopped with an error. Check the terminal for details.';
      footerEl.className = 'footer error';
    }
  } else {
    statusEl.textContent = 'Last updated: ' + formatTime(data.updated_at || new Date().toISOString());
    footerEl.className = 'footer';

    if (data.control_state === 'stop') {
      hideControls();
      document.getElementById('pause-overlay').classList.remove('visible');
      statusEl.textContent = 'Stopping... agent is shutting down gracefully.';
      footerEl.className = 'footer error';
      showStopOverlay();
    } else if (data.control_state === 'pause') {
      if (!document.getElementById('pause-overlay').classList.contains('visible')) {
        document.getElementById('pause-overlay').classList.add('visible');
      }
      document.getElementById('btn-resume').disabled = false;
    } else if (data.control_state === 'resume' || !data.control_state) {
      if (currentControl !== 'pause') {
        document.getElementById('pause-overlay').classList.remove('visible');
      }
    }
  }
}

function showCompletionOverlay(steps) {
  var overlay = document.getElementById('completion-overlay');
  if (overlay.classList.contains('visible')) return;

  var title = document.getElementById('title').textContent;
  document.getElementById('completion-text').textContent = title + ' \u2014 Complete';

  // Total elapsed
  var firstStart = null;
  var lastEnd = null;
  steps.forEach(function(s) {
    if (s.started_at) {
      var t = new Date(s.started_at).getTime();
      if (!firstStart || t < firstStart) firstStart = t;
    }
    if (s.completed_at) {
      var t2 = new Date(s.completed_at).getTime();
      if (!lastEnd || t2 > lastEnd) lastEnd = t2;
    }
  });
  var sub = steps.length + ' steps';
  if (firstStart && lastEnd) {
    sub += ' in ' + formatDuration(lastEnd - firstStart);
  }
  document.getElementById('completion-subtext').textContent = sub;

  // Small delay so the final progress update renders first
  setTimeout(function() {
    overlay.classList.add('visible');
  }, 500);
}

function showStopOverlay() {
  var overlay = document.getElementById('stop-overlay');
  if (overlay.classList.contains('visible')) return;
  setTimeout(function() {
    overlay.classList.add('visible');
  }, 300);
}

function addLocalEvent(message, colorClass) {
  localEvents.push({ time: new Date().toISOString(), message: message, colorClass: colorClass || '' });
  // Force a re-render to include the new local event
  if (lastJson) render(JSON.parse(lastJson));
}

async function sendControl(action) {
  var payload = JSON.stringify({ action: action, time: new Date().toISOString() });
  try {
    await fetch('control.json', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: payload });
    currentControl = action;
    updateControlButtons();

    if (action === 'pause') {
      addLocalEvent('Pause requested \u2014 waiting for agent to pause after current operation', 'event-msg-warn');
      // Show overlay after a short delay to let the agent finish its current operation
      setTimeout(function() {
        if (currentControl === 'pause') {
          document.getElementById('pause-overlay').classList.add('visible');
          // Enable resume button now that pause is in effect
          document.getElementById('btn-resume').disabled = false;
        }
      }, 3000);
    } else if (action === 'resume') {
      addLocalEvent('Resume requested', 'event-msg-success');
      document.getElementById('pause-overlay').classList.remove('visible');
    } else if (action === 'stop') {
      addLocalEvent('Stop requested \u2014 waiting for graceful shutdown', 'event-msg-error');
    }
  } catch (e) {
    document.getElementById('control-status').textContent = 'Failed to send \u2014 server may be down';
  }
}

function updateControlButtons() {
  var btnPause = document.getElementById('btn-pause');
  var btnResume = document.getElementById('btn-resume');
  var btnStop = document.getElementById('btn-stop');
  var controlStatus = document.getElementById('control-status');

  if (currentControl === 'pause') {
    btnPause.style.display = 'none';
    btnResume.style.display = '';
    btnResume.disabled = true;
    btnStop.disabled = false;
    controlStatus.textContent = '';
  } else if (currentControl === 'stop') {
    btnPause.style.display = 'none';
    btnResume.style.display = 'none';
    btnStop.disabled = true;
    controlStatus.textContent = '';
  } else {
    btnPause.style.display = '';
    btnResume.style.display = 'none';
    btnStop.disabled = false;
    controlStatus.textContent = '';
  }
}

function hideControls() {
  document.getElementById('controls').style.display = 'none';
}

async function poll() {
  try {
    var resp = await fetch('progress.json?t=' + Date.now());
    if (!resp.ok) {
      document.getElementById('footer-status').textContent = 'Waiting for progress data...';
      return;
    }
    var text = await resp.text();
    if (text === lastJson) return;
    lastJson = text;
    render(JSON.parse(text));
  } catch (e) {
    document.getElementById('footer-status').textContent = 'Waiting for progress data...';
  }
}

poll();
var intervalId = setInterval(async function() {
  await poll();
  if (lastJson) {
    try {
      var data = JSON.parse(lastJson);
      if (data.status === 'complete' || data.status === 'error') clearInterval(intervalId);
    } catch(e) {}
  }
}, POLL_INTERVAL);
</script>
