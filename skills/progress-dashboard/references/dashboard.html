<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Progress</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* --- Top bar: header + progress + controls --- */
  .top-bar {
    flex-shrink: 0;
    padding: 1.25rem 1.5rem 0 1.5rem;
  }
  header {
    margin-bottom: 0.75rem;
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  h1 { font-size: 1.5rem; font-weight: 600; }
  .env-info {
    display: flex;
    gap: 1rem;
    margin-top: 0.3rem;
    font-size: 0.7rem;
    color: var(--text-muted);
    flex-wrap: wrap;
  }
  .env-info a { color: var(--accent); text-decoration: none; }
  .env-info a:hover { text-decoration: underline; }
  .env-label {
    color: var(--text-muted);
    opacity: 0.6;
    margin-right: 0.2rem;
  }
  .badge {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 1rem;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge-running { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-complete { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-error { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-waiting { background: rgba(139,148,158,0.15); color: var(--text-muted); }

  .progress-bar-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.65rem 1rem;
    margin-bottom: 0.75rem;
  }
  .progress-bar-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.35rem;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .progress-eta {
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .progress-eta .eta-value {
    color: var(--text);
    font-weight: 500;
  }
  .progress-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .progress-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.35rem;
  }
  .controls {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .controls button {
    padding: 0.3rem 0.75rem;
    border-radius: 0.375rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .controls button:hover { border-color: var(--text-muted); }
  .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  .controls button.btn-pause { border-color: var(--yellow); color: var(--yellow); }
  .controls button.btn-pause:hover { background: rgba(210,153,34,0.1); }
  .controls button.btn-resume { border-color: var(--green); color: var(--green); }
  .controls button.btn-resume:hover { background: rgba(63,185,80,0.1); }
  .controls button.btn-stop { border-color: var(--red); color: var(--red); }
  .controls button.btn-stop:hover { background: rgba(248,81,73,0.1); }
  .control-status {
    font-size: 0.7rem;
    color: var(--yellow);
    align-self: center;
    margin-left: 0.5rem;
  }

  /* --- Two-pane layout --- */
  .panes {
    flex: 1;
    display: flex;
    min-height: 0;
    padding: 0 1.5rem;
    gap: 1px;
  }

  .pane {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .pane-left {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
    /* width set dynamically by JS based on longest step name */
  }
  .pane-right {
    flex: 1;
    min-width: 0;
    border-left: 1px solid var(--border);
    padding-left: 1.25rem;
    margin-left: 1.25rem;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .pane-header {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
    flex-shrink: 0;
  }

  .pane-scroll {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .pane-scroll::-webkit-scrollbar { width: 6px; }
  .pane-scroll::-webkit-scrollbar-track { background: transparent; }
  .pane-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* --- Steps --- */
  .steps-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
  }
  .steps { list-style: none; }
  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    transition: border-color 0.2s;
  }
  .step.step-active {
    border-color: var(--yellow);
  }
  .step-icon {
    flex-shrink: 0;
    width: 1.25rem;
    height: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    margin-top: 0.1rem;
  }
  .step-body { flex: 1; min-width: 0; }
  .step-title {
    font-weight: 600;
    font-size: 0.85rem;
    white-space: nowrap;
  }
  .step-detail {
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
    background: rgba(0,0,0,0.2);
    padding: 0.2rem 0.4rem;
    border-radius: 0.2rem;
  }
  .step-detail a { color: var(--accent); text-decoration: none; }
  .step-detail a:hover { text-decoration: underline; }
  .step-status-debug {
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    opacity: 0.7;
    margin-top: 0.15rem;
  }
  .step-time {
    flex-shrink: 0;
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 0.15rem;
  }

  /* --- Issues & PRs panels --- */
  .right-panels {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }
  .right-panel-header {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.35rem;
  }
  .right-panel-empty {
    font-size: 0.7rem;
    color: var(--text-muted);
    opacity: 0.5;
    font-style: italic;
    padding: 0.2rem 0;
  }
  .ticket {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.2rem 0;
    font-size: 0.75rem;
  }
  .ticket-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ticket-dot-open { background: var(--green); }
  .ticket-dot-in_progress { background: var(--yellow); }
  .ticket-dot-closed { background: var(--text-muted); }
  .ticket-dot-merged { background: var(--accent); }
  .ticket a { color: var(--text); text-decoration: none; }
  .ticket a:hover { color: var(--accent); text-decoration: underline; }
  .ticket-status {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-left: auto;
    flex-shrink: 0;
  }

  /* --- Events section (resizable, pinned to bottom) --- */
  .events-section {
    flex: none;
    height: 25vh;
    display: flex;
    flex-direction: column;
    min-height: 80px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
  .events-toolbar {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.3rem 0;
    flex-shrink: 0;
    cursor: ns-resize;
    user-select: none;
  }
  .events-toolbar .pane-header {
    margin-bottom: 0;
    border-bottom: none;
    padding-bottom: 0;
    flex: 1;
  }

  /* --- Events --- */
  .event {
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    padding: 0.2rem 0;
    display: flex;
    gap: 0.6rem;
  }
  .event-time { flex-shrink: 0; font-size: 0.65rem; }
  .event-msg { color: var(--text); }
  .event-msg-warn { color: var(--yellow); }
  .event-msg-error { color: var(--red); }
  .event-msg-success { color: var(--green); }

  /* --- Footer --- */
  .footer {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 1.5rem;
    font-size: 0.7rem;
    color: var(--text-muted);
  }
  .footer.error .footer-status { color: var(--red); }
  .footer-status { flex: 1; text-align: center; }
  .footer-version { flex-shrink: 0; opacity: 0.5; }
  .footer-left {
    flex-shrink: 0;
  }
  .footer-left label {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    user-select: none;
  }
  .footer-left input[type="checkbox"] {
    accent-color: var(--accent);
  }

  /* --- Inline status indicator (next to title) --- */
  .title-status {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-left: 0.75rem;
    font-size: 1.1rem;
    vertical-align: middle;
  }
  .title-status-text {
    font-size: 0.8rem;
    font-weight: 500;
  }

  /* --- Debug panel --- */
  .debug-section {
    flex-shrink: 0;
    height: 200px;
    min-height: 60px;
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--border);
    margin-top: 0.5rem;
  }
  .debug-toolbar {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.3rem 0;
    flex-shrink: 0;
    cursor: ns-resize;
    user-select: none;
  }
  .debug-toolbar .pane-header {
    margin-bottom: 0;
    border-bottom: none;
    padding-bottom: 0;
    flex: 1;
  }
  .debug-toolbar button {
    cursor: pointer;
    padding: 0.15rem 0.5rem;
    border-radius: 0.25rem;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 0.65rem;
    cursor: pointer;
  }
  .debug-toolbar button:hover { border-color: var(--text-muted); color: var(--text); }
  .debug-log {
    flex: 1;
    overflow-y: auto;
    font-family: monospace;
    font-size: 0.65rem;
    line-height: 1.4;
    color: var(--text-muted);
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .debug-log::-webkit-scrollbar { width: 4px; }
  .debug-log::-webkit-scrollbar-track { background: transparent; }
  .debug-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 0.9rem;
    height: 0.9rem;
    border: 2px solid var(--border);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* --- Measuring element (hidden) --- */
  .measure {
    position: absolute;
    visibility: hidden;
    white-space: nowrap;
    font-weight: 600;
    font-size: 0.85rem;
    font-family: inherit;
  }
</style>
</head>
<body>
  <div class="top-bar">
    <header>
      <div class="header-row">
        <h1 id="title">Loading... <span id="title-status" class="title-status"></span></h1>
        <span id="status-badge" class="badge badge-waiting">waiting</span>
      </div>
      <div id="env-info" class="env-info"></div>
    </header>

    <div class="progress-bar-container">
      <div class="progress-bar-label">
        <span id="progress-label">0 / 0 steps</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bar-track">
        <div id="progress-fill" class="progress-bar-fill" style="width: 0%"></div>
      </div>
      <div class="progress-bottom">
        <div id="progress-eta" class="progress-eta"></div>
        <div id="controls" class="controls">
          <span id="control-status" class="control-status"></span>
          <button id="btn-pause" class="btn-pause" onclick="sendControl('pause')">Pause</button>
          <button id="btn-resume" class="btn-resume" onclick="sendControl('resume')" style="display:none">Resume</button>
          <button id="btn-stop" class="btn-stop" onclick="sendControl('stop')">Stop</button>
        </div>
      </div>
    </div>
  </div>

  <div class="panes">
    <div class="pane pane-left" id="pane-steps">
      <div class="steps-section">
        <div class="pane-header">Steps</div>
        <div class="pane-scroll" id="steps-scroll">
          <ul id="steps" class="steps"></ul>
        </div>
        <!-- No overlays — status shown inline next to title -->
      </div>
      <!-- Debug panel (hidden by default) -->
      <div id="debug-panel" class="debug-section" style="display:none">
        <div class="debug-toolbar" id="debug-toolbar">
          <span class="pane-header">Debug Log</span>
          <button onclick="copyDebugLog()">Copy</button>
          <button onclick="downloadDebugLog()">Download</button>
        </div>
        <div id="debug-log" class="debug-log"></div>
      </div>
    </div>
    <div class="pane pane-right">
      <div id="right-panels" class="right-panels" style="display:none">
        <div class="right-panel">
          <div class="right-panel-header">Issues</div>
          <div id="issues"></div>
        </div>
        <div class="right-panel">
          <div class="right-panel-header">Pull Requests</div>
          <div id="prs"></div>
        </div>
      </div>
      <div class="events-section" id="events-section">
        <div class="events-toolbar" id="events-toolbar">
          <span class="pane-header">Event Log</span>
        </div>
        <div class="pane-scroll" id="events-scroll">
          <div id="events"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="poll-status" class="footer">
    <span class="footer-left"><label><input type="checkbox" id="debug-mode" onchange="toggleDebug()"> Debug Mode</label></span>
    <span class="footer-status" id="footer-status">Connecting...</span>
    <span class="footer-version">v21</span>
  </div>

  <span id="measure" class="measure"></span>

<script>
var POLL_INTERVAL = 1500;
var STATUS_ICONS = {
  not_started: '\u25CB',
  in_progress: null,
  complete: '\u2713',
  error: '\u2717',
  skipped: '\u2014'
};
var STATUS_COLORS = {
  not_started: 'var(--text-muted)',
  in_progress: 'var(--yellow)',
  complete: 'var(--green)',
  error: 'var(--red)',
  skipped: 'var(--text-muted)'
};

var lastJson = '';
var currentControl = null;
var localEvents = [];
var debugEntries = [];
var debugEnabled = false;

// --- Debug logging ---
function isScrolledToBottom(el) {
  return el.scrollHeight - el.scrollTop - el.clientHeight < 10;
}

function debugLog(msg) {
  var ts = new Date().toISOString().substr(11, 12);
  var entry = ts + ' ' + msg;
  debugEntries.push(entry);
  if (debugEnabled) {
    var logEl = document.getElementById('debug-log');
    var atBottom = isScrolledToBottom(logEl);
    var line = document.createElement('div');
    line.textContent = entry;
    logEl.appendChild(line);
    if (atBottom) logEl.scrollTop = logEl.scrollHeight;
  }
}

function toggleDebug() {
  debugEnabled = document.getElementById('debug-mode').checked;
  var panel = document.getElementById('debug-panel');
  panel.style.display = debugEnabled ? '' : 'none';
  if (debugEnabled) {
    // Render all buffered entries
    var logEl = document.getElementById('debug-log');
    while (logEl.firstChild) logEl.removeChild(logEl.firstChild);
    debugEntries.forEach(function(entry) {
      var line = document.createElement('div');
      line.textContent = entry;
      logEl.appendChild(line);
    });
    logEl.scrollTop = logEl.scrollHeight;
    debugLog('Debug mode enabled (' + debugEntries.length + ' buffered entries)');
  }
  // Force re-render to toggle debug info in steps
  if (lastJson) render(JSON.parse(lastJson));
}

// --- Resizable panel helper ---
function makeResizable(panelId, toolbarId) {
  var panel = document.getElementById(panelId);
  var toolbar = document.getElementById(toolbarId);
  var dragging = false;
  var startY, startH;

  toolbar.addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'BUTTON') return;
    dragging = true;
    startY = e.clientY;
    startH = panel.offsetHeight;
    document.body.style.cursor = 'ns-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var newH = startH - (e.clientY - startY);
    if (newH < 60) newH = 60;
    if (newH > window.innerHeight * 0.6) newH = window.innerHeight * 0.6;
    panel.style.height = newH + 'px';
    panel.style.flex = 'none';
  });

  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
}

makeResizable('events-section', 'events-toolbar');

// --- Debug panel resize (uses same helper, toolbar ID added below) ---
makeResizable('debug-panel', 'debug-toolbar');

function copyDebugLog() {
  navigator.clipboard.writeText(debugEntries.join('\n')).then(function() {
    debugLog('Log copied to clipboard (' + debugEntries.length + ' entries)');
  });
}

function downloadDebugLog() {
  var blob = new Blob([debugEntries.join('\n')], { type: 'text/plain' });
  var url = URL.createObjectURL(blob);
  var titleText = document.getElementById('title').firstChild.textContent.trim().replace(/\s+/g, '-');
  var a = document.createElement('a');
  a.href = url;
  a.download = titleText + '-' + new Date().toISOString().replace(/[:.]/g, '-') + '.log';
  a.click();
  URL.revokeObjectURL(url);
  debugLog('Log downloaded');
}

// --- Utility functions ---
function formatTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  if (attrs) {
    for (var k of Object.keys(attrs)) {
      var v = attrs[k];
      if (k === 'style' && typeof v === 'object') {
        Object.assign(e.style, v);
      } else if (k === 'className') {
        e.className = v;
      } else if (k === 'textContent') {
        e.textContent = v;
      } else {
        e.setAttribute(k, v);
      }
    }
  }
  if (children) {
    for (var c of children) {
      if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    }
  }
  return e;
}

function measureStepWidth(steps) {
  var ruler = document.getElementById('measure');
  var maxW = 200;
  steps.forEach(function(step, i) {
    ruler.textContent = 'Step ' + (i + 1) + ': ' + (step.name || '');
    var w = ruler.offsetWidth;
    if (w > maxW) maxW = w;
  });
  return maxW + 175;
}

function buildStepEl(step, index, isPaused) {
  var isActive = step.status === 'in_progress';
  var iconEl = el('span', { className: 'step-icon', style: { color: STATUS_COLORS[step.status] || 'var(--text-muted)' } });
  if (isActive && isPaused) {
    iconEl.textContent = '\u23F8';
    iconEl.style.color = 'var(--yellow)';
  } else if (isActive) {
    iconEl.appendChild(el('span', { className: 'spinner' }));
  } else {
    iconEl.textContent = STATUS_ICONS[step.status] || '\u25CB';
  }

  var bodyChildren = [
    el('div', { className: 'step-title', textContent: 'Step ' + (index + 1) + ': ' + (step.name || '') })
  ];

  // Always show issue link (from step data)
  if (step.issue_number) {
    var issueText = 'Issue #' + step.issue_number;
    if (step.issue_title) issueText += ': ' + step.issue_title;
    var issueLink = el('a', { href: step.issue_url || '#', textContent: issueText });
    bodyChildren.push(el('div', { className: 'step-detail' }, [issueLink]));
  }

  // Always show PR link if present
  if (step.pr_number) {
    var prText = 'PR #' + step.pr_number;
    if (step.pr_title) prText += ': ' + step.pr_title;
    var prLink = el('a', { href: step.pr_url || '#', textContent: prText });
    bodyChildren.push(el('div', { className: 'step-detail' }, [prLink]));
  }

  if (step.detail) {
    bodyChildren.push(el('div', { className: 'step-detail', textContent: step.detail }));
  }

  // Additional links (not issue/PR which are shown above)
  if (step.links && step.links.length > 0) {
    var extraLinks = step.links.filter(function(l) {
      return l.label.indexOf('Issue #') !== 0 && l.label.indexOf('PR #') !== 0;
    });
    if (extraLinks.length > 0) {
      var linksDiv = el('div', { className: 'step-detail' });
      extraLinks.forEach(function(link, li) {
        if (li > 0) linksDiv.appendChild(document.createTextNode(' \u00B7 '));
        linksDiv.appendChild(el('a', { href: link.url, textContent: link.label }));
      });
      bodyChildren.push(linksDiv);
    }
  }

  // Debug info at end of step
  if (debugEnabled) {
    bodyChildren.push(el('div', { className: 'step-status-debug', textContent: 'status: ' + step.status + (step.started_at ? '  started: ' + formatTime(step.started_at) : '') + (step.completed_at ? '  completed: ' + formatTime(step.completed_at) : '') }));
  }

  var stepChildren = [iconEl, el('div', { className: 'step-body' }, bodyChildren)];

  if (step.updated_at) {
    stepChildren.push(el('span', { className: 'step-time', textContent: formatTime(step.updated_at) }));
  }

  var className = 'step' + (isActive ? ' step-active' : '');
  var li = el('li', { className: className, id: 'step-' + index }, stepChildren);
  return li;
}

function buildEventEl(evt) {
  return el('div', { className: 'event' }, [
    el('span', { className: 'event-time', textContent: formatTime(evt.time) }),
    el('span', { className: 'event-msg', textContent: evt.message })
  ]);
}

function formatDuration(ms) {
  var totalSec = Math.round(ms / 1000);
  if (totalSec < 60) return totalSec + 's';
  var min = Math.floor(totalSec / 60);
  var sec = totalSec % 60;
  if (min < 60) return min + 'm ' + sec + 's';
  var hr = Math.floor(min / 60);
  min = min % 60;
  return hr + 'h ' + min + 'm';
}

function calcEta(steps) {
  var completed = [];
  var remaining = 0;
  var inProgressStart = null;

  steps.forEach(function(step) {
    if (step.status === 'complete' && step.started_at && step.completed_at) {
      var start = new Date(step.started_at).getTime();
      var end = new Date(step.completed_at).getTime();
      if (end > start) completed.push(end - start);
    } else if (step.status === 'in_progress') {
      if (step.started_at) inProgressStart = new Date(step.started_at).getTime();
      remaining++;
    } else if (step.status === 'not_started') {
      remaining++;
    }
  });

  if (completed.length === 0) {
    if (inProgressStart) return { text: 'Estimating time remaining\u2026 completing first step', state: 'calculating' };
    return { text: '', state: 'none' };
  }

  var avgMs = completed.reduce(function(a, b) { return a + b; }, 0) / completed.length;
  var inProgressRemaining = 0;
  if (inProgressStart) {
    var elapsed = Date.now() - inProgressStart;
    inProgressRemaining = Math.max(0, avgMs - elapsed);
  }
  var totalRemaining = inProgressRemaining + (remaining > 0 ? (remaining - (inProgressStart ? 1 : 0)) * avgMs : 0);
  if (totalRemaining <= 0 && remaining === 0) return { text: '', state: 'none' };

  return {
    text: '~' + formatDuration(totalRemaining) + ' remaining',
    avgText: formatDuration(avgMs) + '/step avg',
    state: 'estimating'
  };
}

var envRendered = false;

function renderEnv(env) {
  if (!env || envRendered) return;
  envRendered = true;
  debugLog('renderEnv: machine=' + env.machine + ' repo=' + env.repo + ' branch=' + env.branch);

  var container = document.getElementById('env-info');
  while (container.firstChild) container.removeChild(container.firstChild);

  function addItem(label, text, url) {
    if (!text) return;
    var span = document.createElement('span');
    var labelEl = document.createElement('span');
    labelEl.className = 'env-label';
    labelEl.textContent = label;
    span.appendChild(labelEl);
    if (url) {
      var a = document.createElement('a');
      a.href = url;
      a.textContent = text;
      a.target = '_blank';
      span.appendChild(a);
    } else {
      span.appendChild(document.createTextNode(text));
    }
    container.appendChild(span);
  }

  addItem('machine ', env.machine);
  addItem('repo ', env.repo, env.repo_url);
  if (env.worktree) addItem('worktree ', env.worktree);
  if (env.branch) {
    var branchUrl = env.repo_url ? env.repo_url + '/tree/' + env.branch : null;
    addItem('branch ', env.branch, branchUrl);
  }
}

function renderTickets(container, items, type) {
  while (container.firstChild) container.removeChild(container.firstChild);
  if (items.length === 0) {
    var empty = document.createElement('div');
    empty.className = 'right-panel-empty';
    empty.textContent = 'Nothing yet, stay tuned...';
    container.appendChild(empty);
    return;
  }
  items.forEach(function(item) {
    var row = document.createElement('div');
    row.className = 'ticket';
    var dot = document.createElement('span');
    dot.className = 'ticket-dot ticket-dot-' + (item.status || 'open');
    row.appendChild(dot);
    var prefix = type === 'pr' ? 'PR' : '';
    var link = document.createElement('a');
    link.href = item.url || '#';
    link.target = '_blank';
    link.textContent = (prefix ? prefix + ' ' : '') + '#' + item.number + ' ' + (item.title || '');
    row.appendChild(link);
    var status = document.createElement('span');
    status.className = 'ticket-status';
    status.textContent = item.status || 'open';
    row.appendChild(status);
    container.appendChild(row);
  });
}

// --- Main render ---
function render(data) {
  var displayTitle = (data.title || data.feature || 'Progress') + ' Roadmap';
  // Set title text without wiping the title-status span
  var titleEl = document.getElementById('title');
  var titleTextNode = titleEl.firstChild;
  if (titleTextNode && titleTextNode.nodeType === 3) {
    titleTextNode.textContent = displayTitle;
  } else {
    titleEl.insertBefore(document.createTextNode(displayTitle), titleEl.firstChild);
  }
  document.title = displayTitle;

  if (data.environment) renderEnv(data.environment);

  var badge = document.getElementById('status-badge');
  badge.textContent = data.status || 'running';
  badge.className = 'badge badge-' + (data.status === 'complete' ? 'complete' : data.status === 'error' ? 'error' : 'running');

  var steps = data.steps || [];
  var done = steps.filter(function(s) { return s.status === 'complete'; }).length;
  var total = steps.length;
  var pct = total > 0 ? Math.round((done / total) * 100) : 0;

  debugLog('render: status=' + data.status + ' steps=' + total + ' done=' + done + ' control_state=' + (data.control_state || 'none'));

  document.getElementById('progress-label').textContent = done + ' / ' + total + ' steps';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  // ETA
  var etaEl = document.getElementById('progress-eta');
  while (etaEl.firstChild) etaEl.removeChild(etaEl.firstChild);
  if (data.status === 'running') {
    var eta = calcEta(steps);
    if (eta.state === 'calculating') {
      etaEl.appendChild(document.createTextNode(eta.text));
    } else if (eta.state === 'estimating') {
      var valSpan = document.createElement('span');
      valSpan.className = 'eta-value';
      valSpan.textContent = eta.text;
      etaEl.appendChild(valSpan);
      if (eta.avgText) etaEl.appendChild(document.createTextNode('  \u00B7  ' + eta.avgText));
    }
  } else if (data.status === 'complete') {
    var firstStart = null, lastEnd = null;
    steps.forEach(function(s) {
      if (s.started_at) { var t = new Date(s.started_at).getTime(); if (!firstStart || t < firstStart) firstStart = t; }
      if (s.completed_at) { var t2 = new Date(s.completed_at).getTime(); if (!lastEnd || t2 > lastEnd) lastEnd = t2; }
    });
    if (firstStart && lastEnd) {
      etaEl.appendChild(document.createTextNode('Completed in '));
      var valSpan2 = document.createElement('span');
      valSpan2.className = 'eta-value';
      valSpan2.textContent = formatDuration(lastEnd - firstStart);
      etaEl.appendChild(valSpan2);
    }
  }

  // Size steps pane
  var paneSteps = document.getElementById('pane-steps');
  var stepsWidth = measureStepWidth(steps);
  paneSteps.style.width = stepsWidth + 'px';

  // Render steps
  var stepsEl = document.getElementById('steps');
  while (stepsEl.firstChild) stepsEl.removeChild(stepsEl.firstChild);
  var activeIndex = -1;
  steps.forEach(function(step, i) {
    stepsEl.appendChild(buildStepEl(step, i, currentControl === 'pause'));
    if (step.status === 'in_progress') activeIndex = i;
  });

  if (activeIndex >= 0) {
    var activeEl = document.getElementById('step-' + activeIndex);
    if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Log individual step statuses
  if (steps.length > 0) {
    var stepSummary = steps.map(function(s, i) { return (i + 1) + ':' + s.status; }).join(' ');
    debugLog('steps: ' + stepSummary);
  }

  // Render issues & PRs
  var issues = data.issues || [];
  var prs = data.prs || [];
  document.getElementById('right-panels').style.display = '';
  renderTickets(document.getElementById('issues'), issues, 'issue');
  renderTickets(document.getElementById('prs'), prs, 'pr');

  // Render events
  var serverEvents = (data.events || []).map(function(e) {
    var cls = '';
    if (e.message && e.message.indexOf('Stop received') >= 0) cls = 'event-msg-error';
    else if (e.message && e.message.indexOf('Pause received') >= 0) cls = 'event-msg-warn';
    else if (e.message && e.message.indexOf('Resume received') >= 0) cls = 'event-msg-success';
    return { time: e.time, message: e.message, colorClass: cls };
  });
  var allEvents = serverEvents.concat(localEvents);
  allEvents.sort(function(a, b) { return a.time < b.time ? -1 : a.time > b.time ? 1 : 0; });

  var eventsEl = document.getElementById('events');
  while (eventsEl.firstChild) eventsEl.removeChild(eventsEl.firstChild);
  allEvents.forEach(function(evt) {
    var msgEl = el('span', { className: 'event-msg' + (evt.colorClass ? ' ' + evt.colorClass : ''), textContent: evt.message });
    var row = el('div', { className: 'event' }, [
      el('span', { className: 'event-time', textContent: formatTime(evt.time) }),
      msgEl
    ]);
    eventsEl.appendChild(row);
  });
  var eventsScroll = document.getElementById('events-scroll');
  if (isScrolledToBottom(eventsScroll)) eventsScroll.scrollTop = eventsScroll.scrollHeight;

  // Footer and inline status indicator (no overlays)
  var footerEl = document.getElementById('poll-status');
  var statusEl = document.getElementById('footer-status');
  var titleStatus = document.getElementById('title-status');
  while (titleStatus.firstChild) titleStatus.removeChild(titleStatus.firstChild);

  function setTitleStatus(icon, text, color) {
    var iconSpan = document.createElement('span');
    iconSpan.textContent = icon;
    iconSpan.style.color = color;
    var textSpan = document.createElement('span');
    textSpan.className = 'title-status-text';
    textSpan.style.color = color;
    textSpan.textContent = text;
    titleStatus.appendChild(iconSpan);
    titleStatus.appendChild(textSpan);
  }

  if (data.status === 'complete') {
    var firstStart = null, lastEnd = null;
    steps.forEach(function(s) {
      if (s.started_at) { var t = new Date(s.started_at).getTime(); if (!firstStart || t < firstStart) firstStart = t; }
      if (s.completed_at) { var t2 = new Date(s.completed_at).getTime(); if (!lastEnd || t2 > lastEnd) lastEnd = t2; }
    });
    var elapsed = (firstStart && lastEnd) ? ' in ' + formatDuration(lastEnd - firstStart) : '';
    setTitleStatus('\u2713', 'Complete' + elapsed, 'var(--green)');
    statusEl.textContent = 'Done.';
    footerEl.className = 'footer';
    hideControls();
    debugLog('status: complete' + elapsed);
  } else if (data.status === 'error') {
    hideControls();
    var wasUserStop = false;
    (data.events || []).forEach(function(e) {
      if (e.message && e.message.indexOf('Stopped by user') >= 0) wasUserStop = true;
    });
    if (wasUserStop || currentControl === 'stop') {
      setTitleStatus('\uD83D\uDED1', 'Stopped', 'var(--red)');
      statusEl.textContent = 'Stopped.';
      footerEl.className = 'footer';
      debugLog('status: stopped by user');
    } else {
      setTitleStatus('\u2717', 'Error', 'var(--red)');
      statusEl.textContent = 'Agent stopped with an error.';
      footerEl.className = 'footer error';
      debugLog('status: error');
    }
  } else {
    statusEl.textContent = 'Last updated: ' + formatTime(data.updated_at || new Date().toISOString());
    footerEl.className = 'footer';

    if (data.control_state === 'stop') {
      hideControls();
      setTitleStatus('\uD83D\uDED1', 'Stopping\u2026', 'var(--red)');
      statusEl.textContent = 'Stopping... agent is shutting down gracefully.';
      footerEl.className = 'footer error';
      debugLog('status: stopping');
    } else if (data.control_state === 'pause') {
      setTitleStatus('\u23F8', 'Paused', 'var(--yellow)');
      document.getElementById('btn-resume').disabled = false;
      debugLog('status: paused');
    }
  }
}

function addLocalEvent(message, colorClass) {
  localEvents.push({ time: new Date().toISOString(), message: message, colorClass: colorClass || '' });
  debugLog('localEvent: ' + message);
  if (lastJson) render(JSON.parse(lastJson));
}

async function sendControl(action) {
  debugLog('sendControl: ' + action);
  var payload = JSON.stringify({ action: action, time: new Date().toISOString() });
  try {
    await fetch('control.json', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: payload });
    currentControl = action;
    updateControlButtons();

    if (action === 'pause') {
      addLocalEvent('Pause requested \u2014 waiting for agent to pause after current operation', 'event-msg-warn');
      setTimeout(function() {
        if (currentControl === 'pause') {
          document.getElementById('btn-resume').disabled = false;
        }
      }, 3000);
    } else if (action === 'resume') {
      addLocalEvent('Resume requested', 'event-msg-success');
    } else if (action === 'stop') {
      addLocalEvent('Stop requested \u2014 waiting for graceful shutdown', 'event-msg-error');
    }
  } catch (e) {
    document.getElementById('control-status').textContent = 'Failed to send \u2014 server may be down';
    debugLog('sendControl ERROR: ' + e.message);
  }
}

function updateControlButtons() {
  var btnPause = document.getElementById('btn-pause');
  var btnResume = document.getElementById('btn-resume');
  var btnStop = document.getElementById('btn-stop');
  var controlStatus = document.getElementById('control-status');

  if (currentControl === 'pause') {
    btnPause.style.display = 'none';
    btnResume.style.display = '';
    btnResume.disabled = true;
    btnStop.disabled = false;
    controlStatus.textContent = '';
  } else if (currentControl === 'stop') {
    btnPause.style.display = 'none';
    btnResume.style.display = 'none';
    btnStop.disabled = true;
    controlStatus.textContent = '';
  } else {
    btnPause.style.display = '';
    btnResume.style.display = 'none';
    btnStop.disabled = false;
    controlStatus.textContent = '';
  }
}

function hideControls() {
  document.getElementById('controls').style.display = 'none';
}

// --- Polling ---
async function poll() {
  try {
    var resp = await fetch('progress.json?t=' + Date.now());
    if (!resp.ok) {
      document.getElementById('footer-status').textContent = 'Waiting for progress data...';
      debugLog('poll: not ok (status ' + resp.status + ')');
      return;
    }
    var text = await resp.text();
    if (text === lastJson) return;
    debugLog('poll: new data (' + text.length + ' bytes)');
    lastJson = text;
    render(JSON.parse(text));
  } catch (e) {
    document.getElementById('footer-status').textContent = 'Waiting for progress data...';
    debugLog('poll: error ' + e.message);
  }
}

debugLog('Dashboard loaded, starting poll');
poll();
var mainInterval = setInterval(function() { poll(); }, POLL_INTERVAL);
var terminated = false;
var completedFully = false;

// Heartbeat: detect terminal status, stop polling, detect restarts
var heartbeatInterval = setInterval(function() {
  if (!lastJson) return;
  try {
    var data = JSON.parse(lastJson);
    var isComplete = data.status === 'complete';
    var isError = data.status === 'error';
    var done = isComplete || isError;
    if (done && !terminated) {
      terminated = true;
      clearInterval(mainInterval);
      debugLog('heartbeat: terminal status (' + data.status + '), main polling stopped');
      if (isComplete) {
        // Fully complete — stop all polling
        completedFully = true;
        clearInterval(heartbeatInterval);
        debugLog('heartbeat: complete — all polling stopped');
        return;
      }
    }
    if (terminated && !done) {
      debugLog('heartbeat: restart detected, reloading page');
      location.reload();
    }
  } catch(e) {}
  // Keep slow poll on error (for restart detection), but not on complete
  if (terminated && !completedFully) poll();
}, 3000);
</script>
